<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Cadastro</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>


<body>


<div class="login-box">


    <h1>Criar Conta</h1>


    <label for="nome">
        Nome
    </label>

    <input
            id="nome"
            type="text"
            placeholder="Nome completo">


    <label for="email">
        Email
    </label>

    <input
            id="email"
            type="email"
            placeholder="E-mail">


    <label for="senha">
        Senha
    </label>

    <input
            id="senha"
            type="password"
            placeholder="Senha">


    <label for="confirma-senha">
        Confirmar Senha
    </label>

    <input
            id="confirma-senha"
            type="password"
            placeholder="Confirmar senha">


    <button id="criar">
        Cadastrar
    </button>


    <button
            class="voltar"
            onclick="window.location.href='login.html'">

        Voltar

    </button>


</div>


<script type="module" src="js/cadastro.js"></script>


</body>

</html>
