<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Novo Agendamento</title>

    <link rel="stylesheet" href="css/novo.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <header>
        <h1>Novo Agendamento</h1>
    </header>

    <div class="grid">

        <div>

            <label for="empresa">Empresa</label>

            <input
                    type="text"
                    id="empresa">

        </div>

        <div>

            <label for="quantidade">Quantidade</label>

            <input
                    type="number"
                    id="quantidade">

        </div>

        <div>

            <label for="horario">Data e Horário</label>

            <input
                    type="datetime-local"
                    id="horario">

        </div>

    </div>

    <label for="texto">Copy</label>

    <textarea id="texto"></textarea>

    <div class="arquivos">

        <!-- Arquivo -->

        <label class="upload">

            <input
                    type="file"
                    id="arquivo"
                    hidden>

            <div class="icone">📄</div>

            <h3>Arquivo</h3>

            <p class="status">
                Clique para selecionar
            </p>

        </label>

        <!-- Imagem -->

        <label class="upload">

            <input
                    type="file"
                    id="imagem"
                    accept="image/*"
                    hidden>

            <div class="icone">🖼️</div>

            <h3>Imagem</h3>

            <p class="status">
                Clique para selecionar
            </p>

        </label>

        <!-- Comprovante -->

        <label class="upload">

            <input
                    type="file"
                    id="comprovante"
                    hidden>

            <div class="icone">💳</div>

            <h3>Comprovante</h3>

            <p class="status">
                Clique para selecionar
            </p>

        </label>

    </div>

    <div class="botoes">

        <button id="salvar">
            Salvar Agendamento
        </button>

        <button
                type="button"
                class="cancelar"
                onclick="location.href='dashboard.html'">

            Cancelar

        </button>

    </div>

</div>

<script type="module" src="js/novo.js"> </script>

</body>
</html>
